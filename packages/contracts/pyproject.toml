[project]
name = "orpheus-contracts"
version = "0.1.0"
description = "Shared API contracts (OpenAPI, AsyncAPI, Protobuf) for Orpheus"
requires-python = ">=3.12"
readme = "README.md"
license = { text = "Apache-2.0" }

# Phase 0: empty. Phase 1+ will add:
# - OpenAPI 3.1 spec (Python wrapper around the FastAPI-generated spec)
# - AsyncAPI 3.0 spec
# - Generated Python data classes from the OpenAPI spec
# - Reusable Pydantic models for shared types (pagination, errors, etc.)

dependencies = [
    "pydantic>=2.9.0",
    "grpcio>=1.62.0",
    "protobuf>=5.27.0",
]

[tool.uv]
dev-dependencies = [
    "grpcio-tools>=1.62.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/orpheus_contracts", "src/orpheus"]
