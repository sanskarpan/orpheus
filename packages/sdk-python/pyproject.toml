[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "orpheus-sdk"
version = "0.2.0"
description = "Dependency-light Python client for the Orpheus audio-processing API."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "Proprietary" }
authors = [{ name = "Orpheus Engineering", email = "api@orpheus.dev" }]
keywords = ["orpheus", "audio", "transcription", "sdk", "api"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "httpx>=0.24,<1",
]

[project.optional-dependencies]
dev = [
    "pytest>=7",
    "pytest-httpx>=0.30",
    "mypy>=1.8",
    "ruff>=0.4",
]

[project.urls]
Homepage = "https://docs.orpheus.dev"
Documentation = "https://docs.orpheus.dev"

[tool.hatch.build.targets.wheel]
packages = ["src/orpheus_sdk"]

[tool.ruff]
line-length = 100
target-version = "py39"
