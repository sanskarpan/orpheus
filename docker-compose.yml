# Local dev stack for Orpheus.
#
# Phase 0: minimal — just the dependencies we'll need from Phase 1 onward.
# Phase 1: API connects to postgres + redis. Workers connect too.
#          Adds Keycloak (auth) + NATS JetStream (event bus).
# Phase 4: Temporal added.
#
# Usage:
#   docker compose up -d           # start
#   docker compose down            # stop
#   docker compose down -v         # stop + wipe volumes
#
# Default credentials are dev-only. NEVER use these in production.

services:
  # ─────────────────────────────────────────────────────────────────
  # Postgres 16 — primary database
  # ─────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: orpheus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: orpheus
      POSTGRES_PASSWORD: orpheus
      POSTGRES_DB: orpheus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orpheus -d orpheus"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─────────────────────────────────────────────────────────────────
  # Redis 7 — queue (Arq) + cache + idempotency + rate limits
  # ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: orpheus-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─────────────────────────────────────────────────────────────────
  # MinIO — S3-compatible object storage (dev only)
  # Production: real AWS S3.
  # ─────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: orpheus-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: orpheus
      MINIO_ROOT_PASSWORD: orpheus-dev-secret
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # Web console (http://localhost:9001)
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─────────────────────────────────────────────────────────────────
  # Keycloak — identity & access management (OIDC / OAuth2)
  # Phase 1+: API validates bearer tokens against this realm.
  #   - Admin console: http://localhost:8088  (admin / admin)
  #   - Realm: orpheus (auto-imported from keycloak/realm-orpheus.json)
  #   - HTTPS port 8443 is started inside the container but NOT published.
  # ─────────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: orpheus-keycloak
    restart: unless-stopped
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: orpheus
      KC_DB_PASSWORD: orpheus
    ports:
      - "8088:8080"  # HTTP only — 8443 (HTTPS) is not exposed in dev
    volumes:
      - ./keycloak/realm-orpheus.json:/opt/keycloak/data/import/realm-orpheus.json:ro
      - keycloak_data:/opt/keycloak/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────────────────────────────
  # NATS JetStream — event bus (Phase 1+).
  # Used by the API to publish domain events; workers subscribe.
  #   - Client port:   4222
  #   - HTTP monitor:  http://localhost:8222
  # Stream: ORPHEUS_JOBS, subjects adkil.job.>, created by the Go API
  # on startup via apps/api/internal/jobs.EnsureStream.
  # ─────────────────────────────────────────────────────────────────
  nats:
    image: nats:2.10-alpine
    container_name: orpheus-nats
    restart: unless-stopped
    command: ["--jetstream", "--store_dir=/data", "--http_port", "8222"]
    ports:
      - "4222:4222"  # client
      - "8222:8222"  # HTTP monitoring
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─────────────────────────────────────────────────────────────────
  # LocalStack — for AWS SDK testing (S3, SQS, etc.) — Phase 0 stub
  # Uncomment when needed.
  # ─────────────────────────────────────────────────────────────────
  # localstack:
  #   image: localstack/localstack:3
  #   container_name: orpheus-localstack
  #   environment:
  #     SERVICES: s3,sqs
  #   ports:
  #     - "4566:4566"

  # ─────────────────────────────────────────────────────────────────
  # Orpheus workers — single-image dev mode (all 3 processes in 1).
  # This is the default in `make up`. The 3 split services below
  # (orpheus-workers-control / -grpc / -worker) are for prod-style
  # deployment where each process runs in its own container. Start
  # them with:
  #   docker compose --profile split up -d
  # ─────────────────────────────────────────────────────────────────
  orpheus-workers-all:
    build:
      context: .
      dockerfile: apps/workers/Dockerfile
    container_name: orpheus-workers-all
    restart: unless-stopped
    environment:
      ORPHEUS_WORKERS_PROCESS: all
      ORPHEUS_WORKER_NATS_URL: nats://nats:4222
      ORPHEUS_WORKER_DATABASE_URL: postgres://orpheus:orpheus@postgres:5432/orpheus?sslmode=disable
      ORPHEUS_WORKER_REDIS_URL: redis://redis:6379/0
      ORPHEUS_WORKER_S3_ENDPOINT: http://minio:9000
      ORPHEUS_WORKER_S3_ACCESS_KEY: orpheus
      ORPHEUS_WORKER_S3_SECRET_KEY: orpheus-dev-secret
    ports:
      - "8081:8081"   # control plane
      - "50051:50051" # gRPC
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ─────────────────────────────────────────────────────────────────
  # Orpheus workers — split mode (one process per container).
  # Opt-in via the `split` profile; not started by `make up` so the
  # dev single-image mode keeps working without port conflicts.
  #
  # Usage:
  #   docker compose --profile split up -d
  #   # or stop the all-mode dev container first to free the ports:
  #   docker compose stop orpheus-workers-all
  # ─────────────────────────────────────────────────────────────────
  orpheus-workers-control:
    profiles: ["split"]
    build:
      context: .
      dockerfile: apps/workers/Dockerfile
    container_name: orpheus-workers-control
    restart: unless-stopped
    environment:
      ORPHEUS_WORKERS_PROCESS: control
      ORPHEUS_WORKER_NATS_URL: nats://nats:4222
      ORPHEUS_WORKER_DATABASE_URL: postgres://orpheus:orpheus@postgres:5432/orpheus?sslmode=disable
      ORPHEUS_WORKER_REDIS_URL: redis://redis:6379/0
      ORPHEUS_WORKER_S3_ENDPOINT: http://minio:9000
      ORPHEUS_WORKER_S3_ACCESS_KEY: orpheus
      ORPHEUS_WORKER_S3_SECRET_KEY: orpheus-dev-secret
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  orpheus-workers-grpc:
    profiles: ["split"]
    build:
      context: .
      dockerfile: apps/workers/Dockerfile
    container_name: orpheus-workers-grpc
    restart: unless-stopped
    environment:
      ORPHEUS_WORKERS_PROCESS: grpc
      ORPHEUS_WORKER_NATS_URL: nats://nats:4222
      ORPHEUS_WORKER_DATABASE_URL: postgres://orpheus:orpheus@postgres:5432/orpheus?sslmode=disable
      ORPHEUS_WORKER_S3_ENDPOINT: http://minio:9000
      ORPHEUS_WORKER_S3_ACCESS_KEY: orpheus
      ORPHEUS_WORKER_S3_SECRET_KEY: orpheus-dev-secret
    ports:
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  orpheus-workers-worker:
    profiles: ["split"]
    build:
      context: .
      dockerfile: apps/workers/Dockerfile
    container_name: orpheus-workers-worker
    restart: unless-stopped
    environment:
      ORPHEUS_WORKERS_PROCESS: worker
      ORPHEUS_WORKER_NATS_URL: nats://nats:4222
      ORPHEUS_WORKER_DATABASE_URL: postgres://orpheus:orpheus@postgres:5432/orpheus?sslmode=disable
      ORPHEUS_WORKER_S3_ENDPOINT: http://minio:9000
      ORPHEUS_WORKER_S3_ACCESS_KEY: orpheus
      ORPHEUS_WORKER_S3_SECRET_KEY: orpheus-dev-secret
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
  keycloak_data:
  nats_data:
