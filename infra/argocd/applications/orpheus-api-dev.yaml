# Standalone Application for orpheus-api in dev. Equivalent to one cell of the
# ApplicationSet matrix; provided for teams that prefer explicit manifests or
# an app-of-apps layout over generators.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: orpheus-api-dev
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: orpheus
    orpheus.io/environment: dev
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: orpheus
  source:
    repoURL: https://github.com/orpheus/orpheus.git
    targetRevision: main
    path: infra/helm/orpheus-api
    helm:
      releaseName: orpheus-api
      valueFiles:
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: orpheus-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
