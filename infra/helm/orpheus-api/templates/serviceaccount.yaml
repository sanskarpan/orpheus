{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "orpheus-api.serviceAccountName" . }}
  labels:
    {{- include "orpheus-api.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# The API does not talk to the Kubernetes API; disable token automounting.
automountServiceAccountToken: false
{{- end }}
