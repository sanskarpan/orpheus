apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "orpheus-api.configMapName" . }}
  labels:
    {{- include "orpheus-api.labels" . | nindent 4 }}
data:
  # All keys are consumed by the Go config loader (ORPHEUS_ prefix stripped at
  # envFrom time via the Deployment). Non-secret values only.
  ORPHEUS_ENV: {{ .Values.env | quote }}
  ORPHEUS_LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  ORPHEUS_SERVICE_NAME: {{ .Values.config.serviceName | quote }}
  ORPHEUS_HOST: "0.0.0.0"
  ORPHEUS_PORT: {{ .Values.config.port | quote }}
  ORPHEUS_SHUTDOWN_GRACE_SECONDS: {{ .Values.config.shutdownGraceSeconds | quote }}
  {{- if not .Values.secrets.databaseUrlFromSecret }}
  ORPHEUS_DATABASE_URL: {{ .Values.config.databaseUrl | quote }}
  {{- end }}
  ORPHEUS_REDIS_URL: {{ .Values.config.redisUrl | quote }}
  ORPHEUS_NATS_URL: {{ .Values.config.natsUrl | quote }}
  ORPHEUS_S3_ENDPOINT: {{ .Values.config.s3.endpoint | quote }}
  ORPHEUS_S3_BUCKET: {{ .Values.config.s3.bucket | quote }}
  ORPHEUS_S3_REGION: {{ .Values.config.s3.region | quote }}
  ORPHEUS_KEYCLOAK_URL: {{ .Values.config.keycloak.url | quote }}
  ORPHEUS_KEYCLOAK_REALM: {{ .Values.config.keycloak.realm | quote }}
  ORPHEUS_KEYCLOAK_CLIENT_ID: {{ .Values.config.keycloak.clientId | quote }}
