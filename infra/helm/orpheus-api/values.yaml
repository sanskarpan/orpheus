# Default values for the orpheus-api chart.
# Override per-environment via ArgoCD (see infra/argocd) or `helm install -f`.

replicaCount: 2

image:
  # Owner is the GHCR org/user; overridden per environment.
  registry: ghcr.io
  owner: orpheus
  repository: orpheus-api
  # Pin to an immutable tag (git sha) in real deployments; "latest" is a dev default.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  # Annotations, e.g. an IRSA role ARN for S3 access on EKS:
  #   eks.amazonaws.com/role-arn: arn:aws:iam::<acct>:role/orpheus-api
  annotations: {}
  name: ""

# Runtime environment: dev, staging, or prod. Drives ORPHEUS_ENV.
env: dev

# Application configuration surfaced as ORPHEUS_* env vars.
# Non-secret values live in the ConfigMap; secrets are referenced from an
# existing Secret (never inlined here).
config:
  logLevel: INFO
  serviceName: orpheus-api
  port: 8080
  shutdownGraceSeconds: 30

  # Connection endpoints. In-cluster hostnames by default; point at managed
  # services (RDS/ElastiCache) via per-environment overrides.
  databaseUrl: "postgres://orpheus:orpheus@orpheus-postgres:5432/orpheus?sslmode=disable"
  redisUrl: "redis://orpheus-redis:6379/0"
  natsUrl: "nats://orpheus-nats:4222"

  s3:
    endpoint: "http://orpheus-minio:9000"
    bucket: "orpheus-uploads"
    region: "us-east-1"

  keycloak:
    url: "http://orpheus-keycloak:8080"
    realm: "orpheus"
    clientId: "orpheus-api"

# Secret references. The named Secret must exist in the namespace and provide
# these keys. Set create=false to manage it out-of-band (e.g. External Secrets).
secrets:
  # Name of the Secret holding sensitive values.
  name: orpheus-api-secrets
  keys:
    databaseUrl: DATABASE_URL       # optional; overrides config.databaseUrl if present
    s3AccessKey: S3_ACCESS_KEY
    s3SecretKey: S3_SECRET_KEY
  # If true, DATABASE_URL is sourced from the Secret instead of the ConfigMap.
  databaseUrlFromSecret: false

service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  annotations: {}

# Container port the API listens on (matches config.port).
containerPort: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Pod-level security context: run as an unprivileged user (distroless nonroot
# is UID/GID 65532) with a read-only root filesystem.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  capabilities:
    drop:
      - ALL

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"

podLabels: {}

nodeSelector: {}
tolerations: []
affinity: {}

# Spread replicas across nodes for availability.
topologySpreadConstraints: []
