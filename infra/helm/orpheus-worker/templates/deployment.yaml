apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "orpheus-worker.fullname" . }}
  labels:
    {{- include "orpheus-worker.labels" . | nindent 4 }}
spec:
  {{- if not .Values.keda.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "orpheus-worker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "orpheus-worker.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- if .Values.gvisor.enabled }}
      # Run under the gVisor syscall sandbox (see infra/k8s/runtimeclass-gvisor.yaml).
      runtimeClassName: {{ .Values.gvisor.runtimeClassName }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "orpheus-worker.serviceAccountName" . }}
      automountServiceAccountToken: false
      # Long grace period lets an in-flight audio job finish before eviction.
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "orpheus-worker.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- if or (eq .Values.process "all") (eq .Values.process "control") (eq .Values.process "grpc") }}
          ports:
            {{- if or (eq .Values.process "all") (eq .Values.process "control") }}
            - name: http
              containerPort: {{ .Values.config.httpPort }}
              protocol: TCP
            {{- end }}
            {{- if or (eq .Values.process "all") (eq .Values.process "grpc") }}
            - name: grpc
              containerPort: {{ .Values.config.grpcPort }}
              protocol: TCP
            {{- end }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "orpheus-worker.configMapName" . }}
          env:
            - name: TMPDIR
              value: /scratch
            {{- if .Values.secrets.databaseUrlFromSecret }}
            - name: ORPHEUS_WORKER_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: {{ .Values.secrets.keys.databaseUrl }}
            {{- end }}
            - name: ORPHEUS_WORKER_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: {{ .Values.secrets.keys.s3AccessKey }}
            - name: ORPHEUS_WORKER_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.name }}
                  key: {{ .Values.secrets.keys.s3SecretKey }}
          {{- if .Values.probes.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.livenessPath }}
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readinessPath }}
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: scratch
              mountPath: /scratch
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: scratch
          emptyDir:
            sizeLimit: {{ .Values.scratch.sizeLimit }}
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
