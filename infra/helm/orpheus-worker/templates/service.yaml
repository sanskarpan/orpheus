{{- if .Values.service.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "orpheus-worker.fullname" . }}
  labels:
    {{- include "orpheus-worker.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    {{- if or (eq .Values.process "all") (eq .Values.process "control") }}
    - name: http
      port: {{ .Values.service.httpPort }}
      targetPort: http
      protocol: TCP
    {{- end }}
    {{- if or (eq .Values.process "all") (eq .Values.process "grpc") }}
    - name: grpc
      port: {{ .Values.service.grpcPort }}
      targetPort: grpc
      protocol: TCP
    {{- end }}
  selector:
    {{- include "orpheus-worker.selectorLabels" . | nindent 4 }}
{{- end }}
