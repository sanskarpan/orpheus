name: orpheus-monorepo

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}
  schedule:
    # Weekly load test (Mondays 06:00 UTC).
    - cron: "0 6 * * 1"

# Cancel in-flight runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  UV_VERSION: "0.5.10"
  GO_VERSION: "1.25"

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Lint, format, type-check (Python)
  # ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint & type-check (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            **/uv.lock
            **/pyproject.toml

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync dependencies
        run: uv sync --all-packages --frozen

      - name: Ruff (lint)
        run: uv run ruff check . --output-format=github

      - name: Ruff (format check)
        run: uv run ruff format --check .

      - name: Pyright (type-check)
        run: uv run pyright

  # ─────────────────────────────────────────────────────────────────
  # Test (Python)
  # ─────────────────────────────────────────────────────────────────
  test:
    name: Test (Python)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            **/uv.lock
            **/pyproject.toml

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install media tools (ffmpeg/ffprobe/espeak-ng)
        # The worker tests skip whole modules when ffmpeg/ffprobe are
        # absent, which is how real command-construction regressions went
        # unnoticed. Install them so those tests actually run.
        run: sudo apt-get update && sudo apt-get install -y ffmpeg espeak-ng

      - name: Sync dependencies
        run: uv sync --all-packages --frozen

      - name: Run tests
        # Exit 5 ("no tests collected") is tolerated only for the contracts
        # placeholder package; any real failure fails the job.
        run: |
          set +e
          uv run pytest --cov=apps --cov=packages --cov-report=xml --cov-report=term
          rc=$?
          set -e
          if [ "$rc" -ne 0 ] && [ "$rc" -ne 5 ]; then
            echo "::error::pytest failed with exit code $rc"
            exit "$rc"
          fi
          echo "pytest exit code: $rc (5=no tests collected)"

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: python

  # ─────────────────────────────────────────────────────────────────
  # Go — lint, vet, test, coverage
  # ─────────────────────────────────────────────────────────────────
  go:
    name: Go (${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.25"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: apps/api/go.sum

      - name: Download modules
        working-directory: apps/api
        run: go mod download

      - name: go mod tidy (verify)
        working-directory: apps/api
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: go vet
        working-directory: apps/api
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
          working-directory: apps/api

      # Bring up the real backing services so the integration tests
      # (RLS, webhooks delivery, idempotency, outbox, audit, rate limit,
      # S3/upload round-trip) actually execute instead of silently
      # skipping — the gap that let several dead-pipeline bugs ship.
      - name: Start services (Postgres, Redis, MinIO)
        run: docker compose up -d postgres redis minio

      - name: Provision test DB + non-superuser role + buckets
        run: ./scripts/ci-db-setup.sh

      - name: go test (race + coverage, integration)
        working-directory: apps/api
        env:
          ORPHEUS_TEST_DATABASE_URL: postgres://orpheus_app:orpheus_app@localhost:5432/orpheus_test?sslmode=disable
          ORPHEUS_TEST_REDIS_URL: redis://localhost:6379/15
          ORPHEUS_TEST_S3: "1"
          ORPHEUS_S3_ENDPOINT: http://localhost:9000
          ORPHEUS_S3_ACCESS_KEY: orpheus
          ORPHEUS_S3_SECRET_KEY: orpheus-dev-secret
          ORPHEUS_S3_BUCKET: orpheus-uploads
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        if: matrix.go-version == '1.25'
        uses: codecov/codecov-action@v4
        with:
          files: ./apps/api/coverage.out
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: go

  # ─────────────────────────────────────────────────────────────────
  # End-to-end — full pipeline: API + real Python worker through
  # NATS JetStream + MinIO + Postgres (ffmpeg / whisper).
  # ─────────────────────────────────────────────────────────────────
  e2e:
    name: E2E (full pipeline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: apps/api/go.sum

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            **/uv.lock
            **/pyproject.toml

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install media tools (ffmpeg/ffprobe/espeak-ng)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg espeak-ng

      - name: Sync worker dependencies
        run: uv sync --all-packages --frozen

      # Cache the whisper model so the transcribe e2e doesn't re-download
      # tiny.en (~75 MB) on every run. ORPHEUS_WORKER_WHISPER_DIR is passed
      # through to the worker subprocess (StartWorker inherits os.Environ).
      - name: Configure whisper cache dir
        run: echo "ORPHEUS_WORKER_WHISPER_DIR=$HOME/.cache/whisper" >> "$GITHUB_ENV"

      - name: Cache whisper model
        uses: actions/cache@v4
        with:
          path: ~/.cache/whisper
          key: whisper-models-${{ runner.os }}-tiny-en-v1

      # Ensure the model is present with retries so a transient HuggingFace
      # 5xx doesn't fail the whole pipeline test. On a cache hit this is a
      # no-op; on a miss it downloads (up to 5 attempts). The test itself
      # then runs with HF_HUB_OFFLINE=1 so faster-whisper never phones home.
      - name: Pre-fetch whisper model (offline-first, retries on miss)
        run: |
          load='from faster_whisper import WhisperModel; WhisperModel("tiny.en", download_root="'"$HOME"'/.cache/whisper")'
          # Fast path: a restored cache means the model is already local, so
          # load it offline and never touch the network.
          if HF_HUB_OFFLINE=1 uv run --package orpheus-workers python -c "$load"; then
            echo "whisper model present (offline)"; exit 0
          fi
          # Cache miss: download with retries so a transient HuggingFace 5xx
          # doesn't fail the pipeline.
          for attempt in 1 2 3 4 5; do
            if uv run --package orpheus-workers python -c "$load"; then
              echo "whisper model downloaded"; exit 0
            fi
            echo "attempt $attempt failed; retrying in $((attempt*10))s"; sleep $((attempt*10))
          done
          # HuggingFace is down AND we have no cached model: don't red the
          # whole pipeline on a third-party outage. Signal the transcribe
          # e2e to skip; the rest of the pipeline (extract/probe/slice)
          # still runs. It downloads-and-caches on the next healthy run.
          echo "::warning::whisper model unavailable after retries (HuggingFace outage?); transcribe e2e will skip"
          echo "WHISPER_UNAVAILABLE=1" >> "$GITHUB_ENV"

      - name: Start services (Postgres, Redis, MinIO, NATS)
        run: docker compose up -d postgres redis minio nats

      - name: Provision test DB + non-superuser role + buckets
        run: ./scripts/ci-db-setup.sh

      - name: go test (e2e — full pipeline through the real worker)
        working-directory: apps/api
        env:
          ORPHEUS_E2E: "1"
          # Model is pre-fetched above; run offline so a HuggingFace 5xx
          # can't fail the pipeline test on the revision-metadata call.
          HF_HUB_OFFLINE: "1"
          ORPHEUS_TEST_DATABASE_URL: postgres://orpheus_app:orpheus_app@localhost:5432/orpheus_test?sslmode=disable
          ORPHEUS_TEST_NATS_URL: nats://localhost:4222
          ORPHEUS_TEST_S3_ENDPOINT: http://localhost:9000
          ORPHEUS_TEST_S3_BUCKET: orpheus-uploads
          ORPHEUS_TEST_S3_ACCESS_KEY: orpheus
          ORPHEUS_TEST_S3_SECRET_KEY: orpheus-dev-secret
        run: go test -count=1 -timeout 600s ./internal/e2e/...

      - name: Dump service logs on failure
        if: failure()
        run: docker compose logs --tail=200 postgres nats minio

  # ─────────────────────────────────────────────────────────────────
  # Load test — on demand (workflow_dispatch) and weekly. Not on PRs.
  # ─────────────────────────────────────────────────────────────────
  loadtest:
    name: Load test (API throughput)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: apps/api/go.sum

      - name: Start services (Postgres, NATS)
        run: docker compose up -d postgres nats minio

      - name: Provision test DB + non-superuser role + buckets
        run: ./scripts/ci-db-setup.sh

      - name: Run load test
        working-directory: apps/api
        env:
          ORPHEUS_LOADTEST: "1"
          ORPHEUS_TEST_DATABASE_URL: postgres://orpheus_app:orpheus_app@localhost:5432/orpheus_test?sslmode=disable
          ORPHEUS_TEST_NATS_URL: nats://localhost:4222
          ORPHEUS_LOAD_DURATION: 20s
          ORPHEUS_LOAD_CONCURRENCY: "50"
          # CI shared runners are slower/noisier than a dev box; keep the
          # gate lenient so it flags gross regressions, not jitter.
          ORPHEUS_LOAD_MAX_P99_MS: "3000"
          ORPHEUS_LOAD_MAX_ERROR_RATE: "0.02"
        run: go test ./internal/e2e/ -run '^TestLoad_APIThroughput$' -v -count=1 -timeout 300s

  # ─────────────────────────────────────────────────────────────────
  # Protobuf / gRPC contract
  # ─────────────────────────────────────────────────────────────────
  proto:
    name: Protobuf (buf)
    runs-on: ubuntu-latest
    # buf breaking --against '.git#branch=main' needs the full git history
    # so we fetch with depth 0. We do NOT run `buf generate` in CI — generated
    # code is checked in and the developer is expected to run `make proto-gen`
    # before pushing. The contract this job enforces is: lint passes + no
    # breaking changes vs main. The breaking check is a no-op on the first
    # PR that adds protos to packages/proto (main has no protos yet), and
    # becomes active in every subsequent PR.
    env:
      BUF_VERSION: "1.47.2"
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install buf
        run: |
          curl --fail -sSL "https://github.com/bufbuild/buf/releases/download/v${BUF_VERSION}/buf-Linux-x86_64" \
            -o /usr/local/bin/buf
          chmod +x /usr/local/bin/buf
          buf --version

      - name: Lint + breaking-change check
        run: make proto-lint

  # ─────────────────────────────────────────────────────────────────
  # Security scan (Python)
  # ─────────────────────────────────────────────────────────────────
  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: |
            **/uv.lock
            **/pyproject.toml

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync dependencies
        run: uv sync --all-packages --frozen

      - name: pip-audit
        run: |
          uv tool run --from pip-audit pip-audit --strict

  # ─────────────────────────────────────────────────────────────────
  # OpenAPI / contract validation
  # Spawns the Go API (apps/api) and validates its OpenAPI spec.
  # ─────────────────────────────────────────────────────────────────
  contract:
    name: OpenAPI validation
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: orpheus
          POSTGRES_PASSWORD: orpheus
          POSTGRES_DB: orpheus
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U orpheus"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      ORPHEUS_DATABASE_URL: "postgres://orpheus:orpheus@localhost:5432/orpheus?sslmode=disable"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: apps/api/go.sum

      - name: Download modules
        working-directory: apps/api
        run: go mod download

      - name: Build the API
        working-directory: apps/api
        # Compile the binary up front so the slow OTel build
        # doesn't blow the 30-second health-check budget in
        # "Wait for /health" below. The binary is then run
        # directly in "Start the API server".
        run: go build -o /tmp/orpheus-api ./cmd/api

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U orpheus >/dev/null 2>&1; then
              echo "Postgres is up"
              break
            fi
            sleep 1
          done

      - name: Start the API server
        run: /tmp/orpheus-api &
        env:
          PORT: "8080"

      - name: Wait for /health
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/health >/dev/null 2>&1; then
              echo "API is up"
              break
            fi
            sleep 1
          done

      - name: Validate OpenAPI spec
        run: |
          set -e
          curl -fsS http://localhost:8080/api/openapi.json -o /tmp/openapi.json
          python3 -c "
          import json, sys
          with open('/tmp/openapi.json') as f:
              spec = json.load(f)
          assert spec['info']['title'] == 'Orpheus API', spec['info']
          assert '/health' in spec['paths'], list(spec['paths'])
          print('OpenAPI OK —', spec['info']['title'], 'v' + spec['info']['version'])
          "

      - name: Stop the API server
        if: always()
        run: |
          pkill -f 'cmd/api' || true

  # ─────────────────────────────────────────────────────────────────
  # OpenAPI lint + breaking-change detection (Phase 6).
  # Redocly lint is report-only (the spec is hand-written; style nits
  # shouldn't block unrelated work). oasdiff is the blocking gate: a
  # breaking change to the committed spec vs the base commit fails CI.
  # ─────────────────────────────────────────────────────────────────
  openapi-diff:
    name: OpenAPI lint + oasdiff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Redocly lint (report-only)
        run: npx --yes @redocly/cli@1.25.11 lint apps/api/api/openapi.json || true

      - name: Resolve base spec
        id: base
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          if [ -z "$BASE" ]; then BASE="$(git rev-parse HEAD~1 2>/dev/null || echo '')"; fi
          if [ -n "$BASE" ] && git cat-file -e "$BASE:apps/api/api/openapi.json" 2>/dev/null; then
            git show "$BASE:apps/api/api/openapi.json" > /tmp/base-openapi.json
            echo "has_base=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_base=false (no base spec to diff against)"
            echo "has_base=false" >> "$GITHUB_OUTPUT"
          fi

      - name: oasdiff breaking-change check (blocking)
        if: steps.base.outputs.has_base == 'true'
        run: |
          docker run --rm -v /tmp:/tmp -v "$PWD/apps/api/api:/spec" \
            tufin/oasdiff:latest breaking \
            /tmp/base-openapi.json /spec/openapi.json --fail-on ERR
